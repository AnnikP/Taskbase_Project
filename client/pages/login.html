<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taskbase – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/login.css"/>
</head>

<body>
  <div class="card">
    <div class="brand">
      <h1>Taskbase</h1>
      <p>Task Manager</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="loginTab">Login</button>
      <button class="tab-btn" id="registerTab">Register</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div>
      <label for="usernameInput">Username</label>
      <input type="text" id="usernameInput" placeholder="your_username" autocomplete="username"/>

      <div class="register-only" id="emailRow">
        <label for="emailInput">Email</label>
        <input type="email" id="emailInput" placeholder="you@example.com"/>
      </div>

      <div class="register-only" id="phoneRow">
        <label for="phoneInput">Phone (optional)</label>
        <input type="tel" id="phoneInput" placeholder="+1 555 000 0000"/>
      </div>

      <label for="passwordInput">Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password"/>

      <button class="submit-btn" id="submitBtn">Login</button>
    </div>
  </div>

<script src="/js/login.js"></script>
</body>
</html>
